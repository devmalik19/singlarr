<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
	<body th:replace="~{layouts/layout :: base('Library')}">
		<div th:fragment="content">
			<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
			<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

			<div style="display: flex; justify-content: space-between; align-items: center;">
				<h2>Library</h2>
				<form th:action="@{/library/metadata/all}" method="post" style="padding: 0; margin: 0;">
					<button type="submit" class="button">Refresh All Metadata</button>
				</form>
			</div>

			<div class="poster-grid">

				<a class="poster" th:each="item: ${library}" th:href="@{/library/{id}(id=${item.id})}">
					<div class="poster-image" th:style="|background-image: url('@{${@imageHelper.getPath(item.image)}}');|">
					</div>
					<div class="poster-details">
						<span class="poster-title" th:text="${item.name}">Item Name</span>
					</div>
				</a>

			</div>

		</div>
	</body>
</html>
