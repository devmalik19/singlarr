<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
	<body th:replace="~{layouts/layout :: base('Download Clients')}">
		<div th:fragment="content">
			<h2>Download Clients</h2>

			<div class="grid">
				<div class="card" data-id="qbt"  onclick="toggleDialogWindow(this)">
					qBittorrent
				</div>
				<div class="card" data-id="sabnzbd"  onclick="toggleDialogWindow(this)">
					Sabnzbd
				</div>
				<div class="card" data-id="slskd"  onclick="toggleDialogWindow(this)">
					Slskd
				</div>
			</div>

			<div th:replace="~{fragments/dialog :: dialog('Add qBittorrent', 'qbt' , '/settings/save/qbt', '/settings/check/qbt')}">
				<div class="form-body" th:fragment="qbt"  th:object="${qbt}">

					<div class="form-row">
						<label for="name_qbt">Name</label>
						<input id="name_qbt" name="name"  th:field="*{name}"  placeholder="qBittorrent" required/>
					</div>

					<div class="form-row">
						<label for="url_qbt">URL</label>
						<input id="url_qbt" name="url"  th:field="*{url}"  type="url" placeholder="http://localhost:9696" required/>
					</div>

					<div class="form-row">
						<label for="username_qbt">Username</label>
						<input id="username_qbt" name="username"  th:value="*{username}" required/>
					</div>

					<div class="form-row">
						<label for="password_qbt">Password</label>
						<input id="password_qbt" name="password"  th:value="*{password}"  type="password" required/>
					</div>

					<div class="form-row">
						<label for="category_qbt">Category</label>
						<input id="category_qbt" name="category"  th:field="*{category}"  />
					</div>

				</div>
			</div>

			<div th:replace="~{fragments/dialog :: dialog('Add Sabnzbd', 'sabnzbd', '/settings/save/sabnzbd', '/settings/check/sabnzbd')}">
				<div class="form-body" th:fragment="sabnzbd"  th:object="${sabnzbd}">

					<div class="form-row">
						<label for="name_sabnzbd">Name</label>
						<input id="name_sabnzbd" name="name"  th:field="*{name}"  placeholder="Sabnzbd" required/>
					</div>

					<div class="form-row">
						<label for="url_sabnzbd">URL</label>
						<input id="url_sabnzbd" name="url"  th:field="*{url}"  type="url" placeholder="http://localhost:9696" required/>
					</div>

					<div class="form-row">
						<label for="apiKey_sabnzbd">API Key</label>
						<input id="apiKey_sabnzbd" name="apiKey"  th:value="*{apiKey}"  type="password" required/>
					</div>

					<div class="form-row">
						<label for="category_sabnzbd">Category</label>
						<input id="category_sabnzbd" name="category"  th:field="*{category}"  />
					</div>
				</div>
			</div>

			<div th:replace="~{fragments/dialog :: dialog('Add Slskd', 'slskd', '/settings/save/slskd', '/settings/check/slskd')}">
				<div class="form-body" th:fragment="slskd"  th:object="${slskd}">

					<div class="form-row">
						<label for="name_slskd">Name</label>
						<input id="name_slskd" name="name"  th:field="*{name}"  placeholder="Slskd" required/>
					</div>

					<div class="form-row">
						<label for="url_slskd">URL</label>
						<input id="url_slskd" name="url"  th:field="*{url}"  type="url" placeholder="http://localhost:9696" required/>
					</div>

					<div class="form-row">
						<label for="apiKey_slskd">API Key</label>
						<input id="apiKey_slskd" name="apiKey"  th:value="*{apiKey}"  type="password" required/>
					</div>

					<div class="form-row">
						<label for="category_slskd">Category</label>
						<input id="category_slskd" name="category"  th:field="*{category}"  />
					</div>
				</div>
			</div>

		</div>
	</body>
</html>
