<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
	<body>
		<div id="searchResults" th:fragment="searchResults">
			<h2> Search Results for </h2>
			<table>
				<thead>
					<tr>
						<th>Title</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="result: ${searchResults}">
						<td th:text="${result.title}">Example Result Title</td>
					</tr>
				</tbody>
			</table>
		</div>
	</body>
</html>
